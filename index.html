<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/style.css">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="container">

    <div class="container-card">
      <div class="info-container">

        <div class="user-image">
          <img src="./assets/images/profile-pic.svg" alt="Profile Picture Of Anonymous Hacker" class="profile-pic">
        </div>

        <div class="user-info">

          <h1 class="user-name">Anonymous Hacker</h1>
          <p class="user-place">London, United Kingdom</p>

        </div>

        <p class="user-profession">"Ethical Hacker and Front-End Developer"</p>
      </div>
      <!-- Navigation Section -->
      <nav class="links-container">
        <a class="btn-primary" href="#">GitHub Profile</a>
        <a class="btn-primary" href="#">Frontend Mentor Profile</a>
        <a class="btn-primary" href="#">LinkedIn Profile</a>
        <a class="btn-primary" href="#">Twitter Profile</a>
        <a class="btn-primary" href="#">Instagram Profile</a>
      </nav>
    </div>
    
  </main>
</body>
</html>
